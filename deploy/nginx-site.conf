# Lonestar Agro — static site (Nginx on Ubuntu)
# After clone to /var/www/lonestar-agro, symlink this file:
#   sudo ln -sf /var/www/lonestar-agro/deploy/nginx-site.conf /etc/nginx/sites-available/lonestar-agro
#   sudo ln -sf /etc/nginx/sites-available/lonestar-agro /etc/nginx/sites-enabled/
# Remove default: sudo rm -f /etc/nginx/sites-enabled/default
# Test: sudo nginx -t && sudo systemctl reload nginx
#
# Replace example.com with www.lonestar-agro.com when DNS points to this droplet, then:
#   sudo certbot --nginx -d example.com -d www.example.com

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/lonestar-agro;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    add_header X-Content-Type-Options "nosniff" always;
}
